spring:
  cloud:
    config:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
